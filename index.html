<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リカゲーム (Rika Game)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0c10; /* 深い黒の背景 */
            color: #ffffff;
            font-family: 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        /* 背景に薄く○△□の幾何学模様を配置 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0.02) 50%, transparent 50%),
                linear-gradient(45deg, transparent 45%, rgba(255, 255, 255, 0.01) 45%, rgba(255, 255, 255, 0.01) 55%, transparent 55%);
            background-size: 60px 60px;
            z-index: -1;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        /* メインタイトル */
        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 6px;
            margin-bottom: 5px;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        /* イカゲームの象徴的な「○△□」マーク */
        .squid-symbols {
            font-size: 2.2rem;
            margin-bottom: 25px;
            letter-spacing: 15px;
            padding-left: 15px; /* 中央揃えの微調整 */
        }
        .circle { color: #ffffff; }       /* ○ (白) */
        .triangle { color: #ff007f; }     /* △ (ショッキングピンク) */
        .square { color: #ff007f; }       /* □ (ショッキングピンク) */

        /* サブタイトル（プレイヤーのジャージをイメージしたミントグリーン） */
        .subtitle {
            font-size: 1.1rem;
            color: #03dac6; 
            letter-spacing: 3px;
            margin-bottom: 50px;
            font-weight: 700;
            text-transform: uppercase;
        }

        /* ゲームリスト */
        .game-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* ゲーム選択ボタン（招待状や管理官のマスクをイメージした直線的デザイン） */
        .game-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 22px 30px;
            background-color: #16171e;
            border: 3px solid #2a2b36;
            text-decoration: none;
            color: #ffffff;
            font-size: 1.2rem;
            font-weight: 700;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        /* ホバー時にピンクのネオン発光効果 */
        .game-card:hover {
            border-color: #ff007f;
            background-color: #251221;
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
        }

        /* ボタン右側のマーク */
        .card-symbol {
            color: #ff007f;
            font-size: 1.4rem;
            font-weight: 900;
        }

        /* フッター */
        footer {
            margin-top: 60px;
            font-size: 0.75rem;
            color: #444655;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>リカゲーム</h1>
        <div class="squid-symbols">
            <span class="circle">○</span><span class="triangle">△</span><span class="square">□</span>
        </div>
        <div class="subtitle">生存をかけたミニゲームを選択せよ</div>

        <div class="game-list">
            <a href="game1/" class="game-card">
                <span>第1ゲーム：だるまさんがころんだ</span>
                <span class="card-symbol">○</span>
            </a>
            
            <a href="game2/" class="game-card">
                <span>第2ゲーム：型抜き</span>
                <span class="card-symbol">△</span>
            </a>

            <a href="game3/" class="game-card">
                <span>第3ゲーム：綱引き</span>
                <span class="card-symbol">□</span>
            </a>
        </div>

        <footer>
            © 456 RIKA GAME. ALL RIGHTS RESERVED.
        </footer>
    </div>

</body>
</html>
