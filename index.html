<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リカゲーム (Rika Game)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght=700;900&display=swap');

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.02) 0%, rgba(255, 255, 255, 0.02) 50%, transparent 50%),
                linear-gradient(45deg, transparent 45%, rgba(255, 255, 255, 0.01) 45%, rgba(255, 255, 255, 0.01) 55%, transparent 55%);
            background-size: 60px 60px;
            z-index: -1;
        }

        .container {
            text-align: center;
            max-width: 600px;
            width: 100%;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 900;
            color: #ffffff;
            letter-spacing: 6px;
            margin-bottom: 5px;
        }

        .squid-symbols {
            font-size: 2.2rem;
            margin-bottom: 25px;
            letter-spacing: 15px;
            padding-left: 15px;
        }
        .circle { color: #ffffff; }
        .triangle { color: #ff007f; }
        .square { color: #ff007f; }

        .subtitle {
            font-size: 1.1rem;
            color: #03dac6; 
            letter-spacing: 3px;
            margin-bottom: 40px;
            font-weight: 700;
        }

        .game-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .game-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 25px;
            background-color: #16171e;
            border: 3px solid #2a2b36;
            text-decoration: none;
            color: #ffffff;
            font-size: 1.15rem;
            font-weight: 700;
            transition: all 0.3s ease;
        }

        .game-card:hover:not(.locked) {
            border-color: #ff007f;
            background-color: #251221;
            transform: translateY(-3px);
            box-shadow: 0 0 20px rgba(255, 0, 127, 0.6);
        }

        /* 🔒 ロック中カード専用のスタイル */
        .game-card.locked {
            opacity: 0.35;
            border: 3px dashed #444;
            background-color: #0d0e12;
            cursor: not-allowed;
        }

        /* 🔓 ロック解除時のネオン風エフェクト */
        .game-card.unlocked {
            border-color: #00ff66 !important;
            box-shadow: 0 0 20px rgba(0, 255, 102, 0.5);
            background-color: #0e2116;
            animation: unlockGlow 1s ease-out;
        }

        @keyframes unlockGlow {
            0% { transform: scale(1); border-color: #444; }
            50% { transform: scale(1.03); border-color: #00ff66; box-shadow: 0 0 30px #00ff66; }
            100% { transform: scale(1); }
        }

        .card-symbol {
            color: #ff007f;
            font-size: 1.3rem;
            font-weight: 900;
        }

        .locked-symbol {
            color: #888;
            font-size: 1.2rem;
        }

        /* 🔑 コード入力エリアのスタイル */
        .code-input-section {
            margin-top: 45px;
            background: #111217;
            border: 1px solid #2a2b36;
            padding: 20px;
            border-radius: 8px;
        }

        .code-input-section h3 {
            font-size: 1rem;
            color: #03dac6;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .input-group {
            display: flex;
            gap: 10px;
            justify-content: center;
        }

        .secret-code-field {
            background: #20222b;
            border: 2px solid #333;
            color: #ffffff;
            padding: 10px 15px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            text-align: center;
            letter-spacing: 2px;
            width: 60%;
            outline: none;
        }

        .secret-code-field:focus {
            border-color: #ff007f;
        }

        .code-submit-btn {
            background: #ff007f;
            color: white;
            border: none;
            padding: 10px 25px;
            font-size: 15px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .code-submit-btn:hover {
            background: #e60072;
        }

        footer {
            margin-top: 40px;
            font-size: 0.75rem;
            color: #444655;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>リカゲーム</h1>
        <div class="squid-symbols">
            <span class="circle">○</span><span class="triangle">△</span><span class="square">□</span>
        </div>
        <div class="subtitle">生存をかけたミニゲームを選択せよ</div>

        <div class="game-list">
            
            <a href="rika_game_bio2-01.html" class="game-card">
                <span>STAGE 1：細胞の構造仕分け</span>
                <span class="card-symbol">○</span>
            </a>
            
            <a href="rika_game_bio2-02.html" class="game-card">
                <span>STAGE 2：単細胞生物の物質出入</span>
                <span class="card-symbol">△</span>
            </a>

            <a href="rika_game_quiz.html" class="game-card">
                <span>STAGE 3：理科一問一答（全526問）</span>
                <span class="card-symbol">□</span>
            </a>

            <a href="#" class="game-card locked" id="stage4-card" onclick="handleStage4Click(event)">
                <span id="stage4-title">STAGE 4：？？？？？？（ロック中）</span>
                <span class="locked-symbol" id="stage4-icon">🔒</span>
            </a>

        </div>

        <div class="code-input-section">
            <h3>🔑 クリアコードを入力してシークレットを解除せよ</h3>
            <div class="input-group">
                <input type="text" class="secret-code-field" id="secretCodeInput" placeholder="CODEを入力" autocomplete="off">
                <button class="code-submit-btn" onclick="verifySecretCode()">送信</button>
            </div>
        </div>

        <footer>
            © 456 RIKA GAME. ALL RIGHTS RESERVED.
        </footer>
    </div>

    <script>
        // 💡 パスワードを「GRIT」に設定しました！大文字小文字を区別します
        const CORRECT_CODE = "GRIT"; 
        let isStage4Unlocked = false;

        function verifySecretCode() {
            const inputField = document.getElementById('secretCodeInput');
            const userCode = inputField.value.trim();

            if (userCode === CORRECT_CODE) {
                if (isStage4Unlocked) {
                    alert("ステージ4は既に解放されている。");
                    return;
                }

                isStage4Unlocked = true;
                
                const card = document.getElementById('stage4-card');
                const title = document.getElementById('stage4-title');
                const icon = document.getElementById('stage4-icon');

                card.classList.remove('locked');
                card.classList.add('unlocked');
                
                // 💡 リンク先を rika_game_rikamon.html に完全一致させました！
                card.href = "rika_game_rikamon.html"; 
                
                title.innerText = "STAGE 4：リカモンバトル（ボーナスステージ）";
                title.style.color = "#00ff66";
                
                icon.innerHTML = "✨";
                icon.className = "";
                icon.style.fontSize = "1.3rem";

                alert("🟢 コード認証成功。シークレットステージが解放された。");
                inputField.value = "";
            } else {
                alert("🔴 コードが違う。やり直せ。");
            }
        }

        function handleStage4Click(e) {
            if (!isStage4Unlocked) {
                e.preventDefault();
                alert('このステージは現在ロックされている。各ゲームをクリアして手に入るコードを入力せよ。');
            }
        }
    </script>
</body>
</html>
