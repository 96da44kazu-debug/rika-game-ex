<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>リカゲーム (Rika Game)</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@700;900&display=swap');

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            background-color: #0b0c10;
            color: #ffffff;
            font-family: 'Noto Sans JP', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container { text-align: center; max-width: 600px; width: 100%; }
        h1 { font-size: 3.5rem; font-weight: 900; letter-spacing: 6px; margin-bottom: 5px; }
        .squid-symbols { font-size: 2.2rem; margin-bottom: 25px; letter-spacing: 15px; padding-left: 15px; }
        .circle { color: #ffffff; } .triangle, .square { color: #ff007f; }
        .subtitle { font-size: 1.1rem; color: #03dac6; letter-spacing: 3px; margin-bottom: 40px; font-weight: 700; }

        /* パスワード入力エリア */
        .code-zone {
            background: #16171e;
            border: 2px dashed #ff007f;
            padding: 20px;
            margin-bottom: 40px;
        }
        .code-input {
            background: #0b0c10;
            border: 2px solid #2a2b36;
            color: #fff;
            padding: 10px;
            font-size: 1.1rem;
            text-align: center;
            letter-spacing: 2px;
            width: 70%;
            text-transform: uppercase; /* 小文字で入力されても大文字に変換 */
        }
        .code-btn {
            background: #ff007f;
            color: white;
            border: none;
            padding: 12px 20px;
            font-weight: bold;
            cursor: pointer;
            margin-left: 10px;
        }

        /* 証（アワード）の表示エリア（最初は隠しておく） */
        .award-box {
            display: none;
            background: linear-gradient(135deg, #1f1c2c, #928dab);
            border: 4px solid #03dac6;
            padding: 30px;
            margin-bottom: 40px;
            animation: flash 1s ease infinite alternate;
        }
        .award-title { font-size: 1.8rem; color: #fff; margin-bottom: 10px; }
        .award-desc { color: #03dac6; font-weight: bold; }

        /* アニメーション演出 */
        @keyframes flash {
            0% { box-shadow: 0 0 10px #03dac6; }
            100% { box-shadow: 0 0 25px #ff007f; }
        }

        /* ゲームリスト */
        .game-list { display: flex; flex-direction: column; gap: 20px; }
        .game-card {
            display: flex; align-items: center; justify-content: space-between;
            padding: 22px 30px; background-color: #16171e; border: 3px solid #2a2b36;
            text-decoration: none; color: #ffffff; font-size: 1.2rem; font-weight: 700;
            transition: all 0.3s ease;
        }
        .game-card:hover { border-color: #ff007f; background-color: #251221; transform: translateY(-3px); }
        .card-symbol { color: #ff007f; font-size: 1.4rem; }
    </style>
</head>
<body>

    <div class="container">
        <h1>リカゲーム</h1>
        <div class="squid-symbols">
            <span class="circle">○</span><span class="triangle">△</span><span class="square">□</span>
        </div>
        <div class="subtitle">生存をかけたミニゲームを選択せよ</div>

        <div class="award-box" id="awardBox">
            <div class="award-title" id="awardTitle">🏆 証のタイトル</div>
            <div class="award-desc" id="awardDesc">証の説明文</div>
        </div>

        <div class="code-zone">
            <p style="margin-bottom: 10px; font-size: 0.9rem; color: #ccc;">クリアコードを入力して【証】を解除せよ</p>
            <input type="text" id="codeInput" class="code-input" placeholder="例: RIKA-CLEAR">
            <button class="code-btn" onclick="checkCode()">送信</button>
        </div>

        <div class="game-list">
            <a href="game1/" class="game-card">
                <span>第1ゲーム：だるまさんがころんだ</span>
                <span class="card-symbol">○</span>
            </a>
        </div>
    </div>

    <script>
        function checkCode() {
            // 入力された文字を取得（大文字に統一、前後の空白削除）
            const input = document.getElementById("codeInput").value.trim().toUpperCase();
            const awardBox = document.getElementById("awardBox");
            const awardTitle = document.getElementById("awardTitle");
            const awardDesc = document.getElementById("awardDesc");

            // コードに応じた判定
            if (input === "RIKA-CLEAR") {
                awardBox.style.display = "block";
                awardTitle.innerText = "🏅 生存者の証";
                awardDesc.innerText = "あなたは過酷なリカゲームを生き延びたことを証明します。";
            } 
            else if (input === "SPEED-STER") {
                awardBox.style.display = "block";
                awardTitle.innerText = "⚡ 韋駄天の証（スピードスター）";
                awardDesc.innerText = "驚異的な速度（60秒以内）でゲームを制圧した強者に贈られる証。";
            } 
            else if (input === "PERFECT-GOD") {
                awardBox.style.display = "block";
                awardTitle.innerText = "👑 神の領域の証（パーフェクト）";
                awardDesc.innerText = "ノーミスかつ迅速に完全勝利を収めた、全プレイヤーの頂点たる証。";
            } 
            else {
                alert("無効なコードです。もう一度確認してください。");
                awardBox.style.display = "none";
            }
        }
    </script>
</body>
</html>
